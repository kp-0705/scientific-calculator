- hosts: local
  become: yes

  tasks:

    - name: Remove old container
      docker_container:
        name: scientific-calculator
        state: absent

    - name: Pull latest image
      docker_image:
        name: kp0705/scientific-calculator
        tag: latest
        source: pull

    - name: Run container
      docker_container:
        name: scientific-calculator
        image: kp0705/scientific-calculator:latest
        state: started
        interactive: true
        tty: true
